<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <base href="/lw2/">
    <link rel="stylesheet" href="src/css/login.css">
</head>
<body>
    <div class="login">
        <img class="login__image" src="src/images/login.png" alt="Login">
        <h1 class="login__title">Войти</h1>
        <div class="login__form">
            <div class="input-field">
                <label class="input-field__label" for="email-input">Электропочта</label>
                <input class="input-field__input" id="email-input" type="text">
                <div class="input-field__hint">Введите электропочту</div>
            </div>
            <div class="input-field">
                <div class="input-field__label">Пароль</div>
                <input class="input-field__input" type="password">
            </div>
            <button class="login__submit">Продолжить</button>
        </div>
    </div>
</body>
</html>
