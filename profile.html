<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Профиль</title>
    <base href="/lw2/">
    <link rel="stylesheet" href="src/css/profile.css">
</head>
<body>
    <div class="top-bar">
        <img src="src/images/home.png" alt="Home">
        <img src="src/images/dot.png" class="top-bar__icon top-bar__icon--dot">
        <img src="src/images/user.png" alt="Profile" class="top-bar__icon top-bar__icon--user">
        <img src="src/images/plus.png" alt="Add">
    </div>

    <div class="profile">
        <div class="profile__avatar">
            <img src="src/images/pfp_big.png" alt="Profile Avatar" class="profile__avatar-img">
        </div>

        <h1 class="profile__name">Ваня Денисов</h1>

        <p class="profile__bio">
            Привет! Я системный аналитик в ACME :) Тут моя<br>жизнь только для самых классных!
        </p>

        <button class="profile__posts-btn">
            <img src="src/images/gallery.png" alt="Gallery" class="profile__posts-icon">
            43 поста
        </button>
    </div>

    <div class="posts-grid">
        <img src="src/images/profile_posts/1.png" alt="Post 1" class="posts-grid__item posts-grid__item--1">
        <img src="src/images/profile_posts/2.png" alt="Post 2" class="posts-grid__item posts-grid__item--2">
        <img src="src/images/profile_posts/3.png" alt="Post 3" class="posts-grid__item posts-grid__item--3">
        <img src="src/images/profile_posts/4.png" alt="Post 4" class="posts-grid__item posts-grid__item--4">
        <img src="src/images/profile_posts/5.png" alt="Post 5" class="posts-grid__item posts-grid__item--5">
        <img src="src/images/profile_posts/6.png" alt="Post 6" class="posts-grid__item posts-grid__item--6">
    </div>
</body>
</html>
